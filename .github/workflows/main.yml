name: Build Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          # Download SDK 14.5 (Commonly used)
          curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz
          mkdir -p ~/theos/sdks
          tar -xf iPhoneOS14.5.sdk.tar.xz -C ~/theos/sdks
          rm iPhoneOS14.5.sdk.tar.xz
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Build Tweak
        run: |
          export THEOS=~/theos
          # Compile to .dylib only
          make FINALPACKAGE=1
          
      - name: Prepare Artifact
        run: |
          mkdir -p output
          cp .theos/obj/debug/MonsterMod.dylib output/MonsterMod.dylib || cp .theos/obj/MonsterMod.dylib output/MonsterMod.dylib

      - name: Upload Dylib
        uses: actions/upload-artifact@v4
        with:
          name: MonsterMod-Dylib
          path: output/MonsterMod.dylib
