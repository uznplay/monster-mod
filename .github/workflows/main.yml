name: Build Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Theos
        run: |
          # Install ldid via brew
          brew install ldid
          git clone --recursive https://github.com/theos/theos.git ~/theos
          # Ensure sdks dir is clean
          rm -rf ~/theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Build Tweak
        run: |
          export THEOS=~/theos
          make FINALPACKAGE=1
          
      - name: Prepare Artifact
        run: |
          mkdir -p output
          cp .theos/obj/debug/MonsterMod.dylib output/MonsterMod.dylib || cp .theos/obj/MonsterMod.dylib output/MonsterMod.dylib

      - name: Upload Dylib
        uses: actions/upload-artifact@v4
        with:
          name: MonsterMod-Dylib
          path: output/MonsterMod.dylib
